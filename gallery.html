<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Robert Correas-Rivera</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .section-block {
      padding: 2.5rem 0;
      border-top: 1.5px solid var(--bark);
    }

    .section-block:first-of-type {
      border-top: none;
      padding-top: 0;
    }

    /* ── PHOTO GRID ── */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-top: 1.2rem;
    }

    .photo-grid.graphics {
      grid-template-columns: repeat(3, 1fr);
    }

    .gallery-slot {
      aspect-ratio: 1;
      background: var(--fog);
      border: 1.5px solid var(--bark);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      transition: opacity 0.15s;
      position: relative;
    }

    .gallery-slot:hover { opacity: 0.85; }

    .gallery-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .gallery-slot .ph {
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      font-size: 0.58rem;
      color: var(--stone);
      text-align: center;
      padding: 0.8rem;
      letter-spacing: 0.06em;
      line-height: 1.6;
    }

    /* wide slot for graphics that are landscape */
    .gallery-slot.wide {
      aspect-ratio: 4/3;
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,26,24,0.93);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }

    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border: 2px solid var(--cream);
    }

    #lightbox-close {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--cream);
      cursor: pointer;
      background: none;
      border: 1px solid var(--cream);
      padding: 0.4rem 0.8rem;
    }

    /* ── INSTRUCTIONS ── */
    .instructions {
      background: white;
      border: 1.5px dashed var(--fog);
      padding: 1rem 1.2rem;
      margin-top: 1rem;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      font-size: 0.65rem;
      color: var(--stone);
      line-height: 1.7;
      letter-spacing: 0.04em;
    }

    .instructions strong {
      color: var(--rust);
    }

    @media (max-width: 600px) {
      .photo-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-name">RCR</a>
  <ul class="nav-links">
    <li><a href="index.html">About</a></li>
    <li><a href="portfolio.html">Portfolio</a></li>
    <li><a href="gallery.html" class="active">Gallery</a></li>
    <li><a href="technical.html">Technical</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<div class="container">

  <div class="page-header">
    <p class="eyebrow">Photography &amp; Design</p>
    <h1>Gallery</h1>
  </div>

  <!-- Photos -->
  <div class="section-block">
    <div class="section-label">Photography — 6 Images</div>

    <div class="photo-grid" id="photos">
      <div class="gallery-slot"><img src="images/photo-01.jpg" alt="Musical theater performance"></div>
      <div class="gallery-slot"><img src="images/photo-02.jpg" alt="University orientation"></div>
      <div class="gallery-slot"><img src="images/photo-03.jpg" alt="Cat at night window"></div>
      <div class="gallery-slot"><img src="images/photo-04.jpg" alt="Professor speaking"></div>
      <div class="gallery-slot"><img src="images/photo-05.jpg" alt="Campus garden"></div>
      <div class="gallery-slot"><img src="images/photo-06.jpg" alt="Media production class"></div>
    </div>
  </div>

  <!-- Graphics -->
  <div class="section-block">
    <div class="section-label">Graphic Design — 6 Examples</div>

    <div class="photo-grid graphics" id="graphics">
      <div class="gallery-slot wide"><img src="images/graphic-06.jpg" alt="The Paragon Cortex film poster"></div>
      <div class="gallery-slot wide"><img src="images/graphic-07.jpg" alt="Royal Roundup social graphic"></div>
      <div class="gallery-slot wide"><img src="images/graphic-03.jpg" alt="University of Scranton social graphic"></div>
      <div class="gallery-slot wide"><img src="images/graphic-04.jpg" alt="University of Scranton social graphic"></div>
      <div class="gallery-slot wide"><img src="images/graphic-05.jpg" alt="Study abroad social graphic"></div>
      <div class="gallery-slot wide"><img src="images/graphic-01.jpg" alt="GVSD content strategy spec project"></div>
    </div>


  </div>

</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lightbox-close">✕ Close</button>
  <img id="lightbox-img" src="" alt="">
</div>

<footer>
  <span>© 2026 Robert Correas-Rivera</span>
  <a href="contact.html">rbcorr02@gmail.com</a>
</footer>

<script>
  // Simple lightbox for actual images (not placeholders)
  document.querySelectorAll('.gallery-slot img').forEach(img => {
    img.parentElement.addEventListener('click', () => {
      document.getElementById('lightbox-img').src = img.src;
      document.getElementById('lightbox').classList.add('open');
    });
  });

  document.getElementById('lightbox-close').addEventListener('click', () => {
    document.getElementById('lightbox').classList.remove('open');
  });

  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) {
      e.currentTarget.classList.remove('open');
    }
  });
</script>

</body>
</html>
